<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#4A7C3F">
<title>노인 시각 체험 시뮬레이터</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f4f3ef;}
.header{background:#4A7C3F;color:#fff;padding:14px 16px 10px;}
.header h1{font-size:17px;font-weight:600;}
.header p{font-size:11px;opacity:.8;margin-top:2px;}
.wrap{padding:14px 14px 30px;}
.slbl{font-size:11px;font-weight:700;color:#4A7C3F;margin:12px 0 7px;letter-spacing:.5px;}
.cond-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:4px;}
.cb{padding:10px 4px;border-radius:10px;border:2px solid #ddd;background:#fff;cursor:pointer;font-size:11px;text-align:center;line-height:1.5;}
.cb .ico{font-size:20px;display:block;margin-bottom:3px;}
.cb.on{border-color:#4A7C3F;background:#eef6eb;font-weight:700;color:#2d5a1b;}
.scene-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:4px;}
.sb{padding:7px 14px;border-radius:20px;border:2px solid #ddd;background:#fff;cursor:pointer;font-size:12px;color:#555;}
.sb.on{border-color:#4A7C3F;background:#eef6eb;font-weight:700;color:#2d5a1b;}
.vbox{position:relative;border-radius:12px;overflow:hidden;border:1px solid #ccc;margin:10px 0;box-shadow:0 2px 10px rgba(0,0,0,.15);background:#000;}
.vbox-inner{position:relative;width:100%;}
#bgImg{display:block;width:100%;height:auto;transition:filter 0.25s;}
#ec{position:absolute;top:0;left:0;width:100%;height:100%;}
.lbar{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.65));padding:20px 14px 10px;display:flex;gap:8px;align-items:flex-end;z-index:3;}
.ln{font-size:13px;font-weight:700;color:#fff;}
.ld{font-size:11px;color:rgba(255,255,255,.75);}
.ctrlbox{background:#fff;border-radius:11px;padding:13px 15px;margin-bottom:9px;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.empty{font-size:12px;color:#aaa;text-align:center;padding:4px 0;}
.cr{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
.cr:last-child{margin-bottom:0;}
.cl{font-size:12px;color:#666;min-width:65px;}
.cr input{flex:1;accent-color:#4A7C3F;}
.cv{font-size:12px;font-weight:700;min-width:32px;text-align:right;color:#4A7C3F;}
.icard{background:#fff;border-radius:11px;padding:13px 15px;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.iname{font-size:14px;font-weight:700;color:#222;margin-bottom:6px;}
.itxt{font-size:12px;color:#555;line-height:1.7;margin-bottom:10px;}
.stats{display:flex;gap:9px;flex-wrap:wrap;}
.st{background:#f4f3ef;border-radius:8px;padding:8px 12px;text-align:center;flex:1;min-width:65px;}
.sn{font-size:15px;font-weight:700;color:#2d5a1b;}
.sl{font-size:10px;color:#888;margin-top:2px;}
.tip{background:#fff8e1;border-left:3px solid #f9a825;border-radius:0 8px 8px 0;padding:9px 12px;margin-top:10px;font-size:11px;color:#555;line-height:1.65;}
</style>
</head>
<body>
<div class="header">
  <h1>👁 노인 시각 체험 시뮬레이터</h1>
  <p>직접 촬영한 실제 사진으로 체험해보세요</p>
</div>
<div class="wrap">
<p class="slbl">질환 선택</p>
<div class="cond-grid">
<button class="cb on" onclick="sC('normal',this)"><span class="ico">👁</span>정상시야</button>
<button class="cb" onclick="sC('cataract',this)"><span class="ico">🌫</span>백내장</button>
<button class="cb" onclick="sC('glaucoma',this)"><span class="ico">🌑</span>녹내장</button>
<button class="cb" onclick="sC('amd',this)"><span class="ico">🔴</span>황반변성</button>
<button class="cb" onclick="sC('diabetic',this)"><span class="ico">💧</span>당뇨망막</button>
<button class="cb" onclick="sC('night',this)"><span class="ico">🌙</span>야간저하</button>
</div>
<p class="slbl">배경 장면</p>
<div class="scene-row">
<button class="sb on" onclick="sS('kiosk',this)">🖥 키오스크</button>
<button class="sb" onclick="sS('park',this)">🌳 공원</button>
<button class="sb" onclick="sS('product',this)">📦 실생활제품</button>
<button class="sb" onclick="sS('night',this)">🌃 야경</button>
</div>
<div class="vbox">
  <div class="vbox-inner">
    <img id="bgImg" alt="배경">
    <canvas id="ec"></canvas>
  </div>
  <div class="lbar"><span class="ln" id="ln">정상 시야</span><span class="ld" id="ld">키오스크 화면</span></div>
</div>
<div class="ctrlbox" id="ctrlbox"><p class="empty">질환을 선택하면 슬라이더가 나타납니다.</p></div>
<div class="icard" id="icard">
<p class="iname">👁 정상 시야란?</p>
<p class="itxt">건강한 눈은 선명하고 넓은 시야를 가지며 색상을 정확히 구분하고 초점 조절이 가능합니다.</p>
<div class="stats"><div class="st"><div class="sn">20/20</div><div class="sl">시력</div></div><div class="st"><div class="sn">180°</div><div class="sl">시야각</div></div></div>
<div class="tip">💡 질환 버튼을 눌러 노인이 보는 세상을 체험해보세요!</div>
</div>
</div>

};
var CTRL={
  cataract:[{id:'blur',lb:'흐림'},{id:'yellow',lb:'황색화'}],
  glaucoma:[{id:'tunnel',lb:'시야 협착'}],
  amd:[{id:'scotoma',lb:'중심 암점'},{id:'distort',lb:'왜곡'}],
  diabetic:[{id:'spots',lb:'부유물'},{id:'blur2',lb:'흐림'}],
  night:[{id:'dark',lb:'어두움'},{id:'glare',lb:'빛 번짐'}]
};
var vals={blur:60,yellow:40,tunnel:65,scotoma:70,distort:40,spots:60,blur2:40,dark:70,glare:60};
var curC='normal',curS='kiosk';
function sC(id,el){
  curC=id;
  document.querySelectorAll('.cb').forEach(function(b){b.classList.remove('on');});el.classList.add('on');
  var d=INFO[id];
  document.getElementById('ln').textContent=d.nm;
  document.getElementById('icard').innerHTML='<p class="iname">'+d.ico+' '+d.nm+'이란?</p><p class="itxt">'+d.dt+'</p><div class="stats">'+d.st.map(function(s){return '<div class="st"><div class="sn">'+s.n+'</div><div class="sl">'+s.l+'</div></div>';}).join('')+'</div><div class="tip">💡 '+d.tp+'</div>';
  var defs=CTRL[id];var box=document.getElementById('ctrlbox');
  if(!defs){box.innerHTML='<p class="empty">질환을 선택하면 슬라이더가 나타납니다.</p>';}
  else{box.innerHTML=defs.map(function(c){return '<div class="cr"><span class="cl">'+c.lb+'</span><input type="range" min="0" max="100" value="'+vals[c.id]+'" oninput="upd(\''+c.id+'\',this.value)"><span class="cv" id="V'+c.id+'">'+vals[c.id]+'%</span></div>';}).join('');}
  fx();
}
function sS(id,el){
  curS=id;
  document.querySelectorAll('.sb').forEach(function(b){b.classList.remove('on');});el.classList.add('on');
  document.getElementById('bgImg').src=IM[id];
  document.getElementById('ld').textContent=SN[id];
}
function upd(id,v){vals[id]=parseInt(v);var el=document.getElementById('V'+id);if(el)el.textContent=v+'%';fx();}
function fx(){
  var img=document.getElementById('bgImg');
  var ec=document.getElementById('ec');
  var w=img.offsetWidth||300,h=img.offsetHeight||400;
  ec.width=w;ec.height=h;
  var ctx=ec.getContext('2d');ctx.clearRect(0,0,w,h);
  img.style.filter='none';
  if(curC==='normal')return;
  if(curC==='cataract'){
    var bl=vals.blur/100,yl=vals.yellow/100;
    img.style.filter='blur('+Math.round(bl*14)+'px) brightness('+(1-bl*0.25).toFixed(2)+') sepia('+yl.toFixed(2)+') saturate('+(1-bl*0.5).toFixed(2)+')';return;
  }
  if(curC==='glaucoma'){
    var t=vals.tunnel/100,cx=w/2,cy=h/2,r=Math.min(w,h)*(0.48-t*0.35);
    ctx.fillStyle='rgba(0,0,0,0.97)';ctx.fillRect(0,0,w,h);
    ctx.save();ctx.globalCompositeOperation='destination-out';
    var g=ctx.createRadialGradient(cx,cy,0,cx,cy,Math.max(15,r));
    g.addColorStop(0,'rgba(0,0,0,1)');g.addColorStop(0.6,'rgba(0,0,0,1)');g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g;ctx.fillRect(0,0,w,h);ctx.restore();
  }
  if(curC==='amd'){
    var sc=vals.scotoma/100,di=vals.distort/100,cx=w/2,cy=h/2,r=50+sc*72;
    var g=ctx.createRadialGradient(cx,cy,r*0.2,cx,cy,r);
    g.addColorStop(0,'rgba(8,8,8,0.98)');g.addColorStop(0.5,'rgba(55,30,30,0.82)');g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
    if(di>0.1)for(var i=0;i<12;i++){ctx.fillStyle='rgba(75,55,55,'+di*0.4+')';ctx.beginPath();ctx.ellipse(cx-80+Math.random()*160,cy-80+Math.random()*160,12+Math.random()*22,5+Math.random()*9,Math.random()*Math.PI,0,Math.PI*2);ctx.fill();}
  }
  if(curC==='diabetic'){
    var sp=vals.spots/100,bl=vals.blur2/100;
    if(bl>0.1)img.style.filter='blur('+Math.round(bl*7)+'px) saturate('+(1-bl*0.35).toFixed(2)+')';
    for(var i=0;i<Math.floor(sp*35);i++){ctx.fillStyle='rgba(55,8,8,'+(0.45+Math.random()*0.5)+')';ctx.beginPath();ctx.arc(Math.random()*w,Math.random()*h,2+Math.random()*6,0,Math.PI*2);ctx.fill();}
    for(var i=0;i<Math.floor(sp*8);i++){ctx.strokeStyle='rgba(90,10,10,'+(0.3+Math.random()*0.5)+')';ctx.lineWidth=2+Math.random()*3;ctx.beginPath();var x1=Math.random()*w,y1=Math.random()*h;ctx.moveTo(x1,y1);ctx.lineTo(x1+Math.random()*40-20,y1+Math.random()*40-20);ctx.stroke();}
  }
  if(curC==='night'){
    var dk=vals.dark/100,gl=vals.glare/100;
    img.style.filter='brightness('+(1-dk*0.78).toFixed(2)+') saturate('+(1-dk*0.45).toFixed(2)+')';
    ctx.fillStyle='rgba(0,0,18,'+dk*0.5+')';ctx.fillRect(0,0,w,h);
    if(gl>0.1){
      var srcs=curS==='night'?[[w*.42,h*.32],[w*.28,h*.52],[w*.65,h*.42]]:[[w*.3,h*.3],[w*.7,h*.4]];
      srcs.forEach(function(lp){var rad=80+gl*150;var gr=ctx.createRadialGradient(lp[0],lp[1],0,lp[0],lp[1],rad);gr.addColorStop(0,'rgba(255,255,200,'+gl*0.9+')');gr.addColorStop(0.25,'rgba(255,220,90,'+gl*0.5+')');gr.addColorStop(1,'rgba(255,150,30,0)');ctx.fillStyle=gr;ctx.fillRect(0,0,w,h);});
    }
  }
}
document.getElementById('bgImg').onload=function(){fx();};
document.getElementById('bgImg').src=IM['kiosk'];
</script>
</body>
</html>
