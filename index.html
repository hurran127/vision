<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="시각 체험">
<meta name="theme-color" content="#1a237e">
<title>어르신의 눈으로 시각 체험</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif;
    background: #0d0d1a;
    color: #fff;
    overflow-x: hidden;
  }

  .topbar {
    width: 100%;
    padding: 0.85rem 1rem;
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(26,35,126,0.97);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .top-eye { font-size: 22px; }
  .top-title { font-size: 15px; font-weight: 700; flex: 1; }
  .new-badge {
    background: #e53935;
    color: #fff;
    font-size: 10px;
    font-weight: 800;
    padding: 3px 9px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }

  .video-wrap {
    width: 100%;
    aspect-ratio: 4/3;
    background: #000;
    position: relative;
    overflow: hidden;
  }
  #videoEl {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  #canvasEl {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    display: none;
  }

  .cam-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.72);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
  }
  .cam-overlay-icon { font-size: 48px; opacity: 0.7; }
  .cam-overlay p {
    color: rgba(255,255,255,0.75);
    font-size: 14px;
    text-align: center;
    line-height: 1.65;
  }
  .start-btn {
    background: #3f51b5;
    color: #fff;
    border: none;
    border-radius: 28px;
    padding: 13px 36px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .start-btn:active { opacity: 0.82; }

  .filter-section {
    padding: 1rem 1rem 0.5rem;
    background: #1a237e;
  }
  .filter-label {
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .filters-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .filter-btn {
    background: rgba(255,255,255,0.10);
    border: 1.5px solid rgba(255,255,255,0.18);
    border-radius: 14px;
    padding: 10px 6px 8px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    transition: background 0.12s, border-color 0.12s;
    -webkit-tap-highlight-color: transparent;
  }
  .filter-btn.active {
    background: rgba(99,102,241,0.40);
    border-color: #818cf8;
  }
  .filter-btn:active { opacity: 0.75; }
  .f-icon { font-size: 22px; }
  .f-name { font-size: 11.5px; font-weight: 700; color: #fff; text-align: center; line-height: 1.3; }
  .f-sub  { font-size: 10px; color: rgba(255,255,255,0.55); text-align: center; }

  .desc-card {
    background: rgba(255,255,255,0.07);
    margin: 0;
    padding: 12px 16px;
    font-size: 13px;
    line-height: 1.65;
    color: rgba(255,255,255,0.82);
    background: #151b5e;
  }
  .desc-card strong { color: #fff; font-weight: 700; }
</style>
</head>
<body>

<div class="topbar">
  <span class="top-eye" aria-hidden="true">👁</span>
  <span class="top-title">어르신의 눈으로 시각 체험</span>
  <span class="new-badge">NEW</span>
</div>

<div class="video-wrap">
  <video id="videoEl" autoplay playsinline muted></video>
  <canvas id="canvasEl"></canvas>
  <div class="cam-overlay" id="camOverlay">
    <div class="cam-overlay-icon" aria-hidden="true">🎥</div>
    <p>카메라를 켜서<br>노화 시각 체험을 시작하세요</p>
    <button class="start-btn" id="startBtn">카메라 시작</button>
  </div>
</div>

<div class="filter-section">
  <p class="filter-label">시각 증상 선택</p>
  <div class="filters-grid">
    <button class="filter-btn active" data-filter="normal">
      <span class="f-icon" aria-hidden="true">👁</span>
      <span class="f-name">정상 시야</span>
      <span class="f-sub">필터 없음</span>
    </button>
    <button class="filter-btn" data-filter="cataract">
      <span class="f-icon" aria-hidden="true">🌫</span>
      <span class="f-name">백내장</span>
      <span class="f-sub">흐림·노란빛</span>
    </button>
    <button class="filter-btn" data-filter="glaucoma">
      <span class="f-icon" aria-hidden="true">⭕</span>
      <span class="f-name">녹내장</span>
      <span class="f-sub">터널 시야</span>
    </button>
    <button class="filter-btn" data-filter="amd">
      <span class="f-icon" aria-hidden="true">🕳</span>
      <span class="f-name">황반변성</span>
      <span class="f-sub">중심 암점</span>
    </button>
    <button class="filter-btn" data-filter="dr">
      <span class="f-icon" aria-hidden="true">💧</span>
      <span class="f-name">당뇨망막병증</span>
      <span class="f-sub">부유물·암점</span>
    </button>
    <button class="filter-btn" data-filter="lowvision">
      <span class="f-icon" aria-hidden="true">🌑</span>
      <span class="f-name">저시력</span>
      <span class="f-sub">전반적 저하</span>
    </button>
  </div>
</div>

<div class="desc-card" id="descCard">
  <strong>정상 시야</strong> — 필터가 적용되지 않은 일반 시야입니다.
</div>

<script>
const FILTERS_INFO = {
  normal:    { desc: '<strong>정상 시야</strong> — 필터가 적용되지 않은 일반 시야입니다.' },
  cataract:  { desc: '<strong>백내장</strong> — 수정체가 혼탁해져 시야가 뿌옇고 노란빛이 도는 증상입니다. 밝은 곳에서 눈부심이 심해집니다.' },
  glaucoma:  { desc: '<strong>녹내장</strong> — 시신경이 손상되어 주변 시야가 좁아지는 터널 시야 현상입니다. 말기에는 중심 시야만 남습니다.' },
  amd:       { desc: '<strong>황반변성</strong> — 망막 중심부(황반)가 손상되어 중앙이 보이지 않는 증상입니다. 글자나 얼굴을 보기 어렵습니다.' },
  dr:        { desc: '<strong>당뇨망막병증</strong> — 망막 혈관 손상으로 출혈 반점, 부유물, 시야 흐림이 나타납니다.' },
  lowvision: { desc: '<strong>저시력</strong> — 교정 후에도 시력이 크게 낮은 상태입니다. 전반적으로 어둡고 흐릿하게 보입니다.' }
};

const video = document.getElementById('videoEl');
const canvas = document.getElementById('canvasEl');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('camOverlay');
const descCard = document.getElementById('descCard');
let currentFilter = 'normal';
let animId = null;

document.getElementById('startBtn').addEventListener('click', async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 960 } },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
    overlay.style.display = 'none';
    canvas.style.display = 'block';
    startLoop();
  } catch(e) {
    overlay.querySelector('p').textContent = '카메라 접근이 거부되었습니다.\n설정에서 카메라 권한을 허용해 주세요.';
  }
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    descCard.innerHTML = FILTERS_INFO[currentFilter].desc;
  });
});

function startLoop() {
  function draw() {
    if (video.readyState < 2) { animId = requestAnimationFrame(draw); return; }
    canvas.width = video.videoWidth || 640;
    canvas.height = video.videoHeight || 480;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    applyFilter(currentFilter);
    animId = requestAnimationFrame(draw);
  }
  draw();
}

function applyFilter(type) {
  const w = canvas.width, h = canvas.height;
  const cx = w / 2, cy = h / 2;
  if (type === 'normal') return;

  if (type === 'cataract') {
    ctx.fillStyle = 'rgba(255,240,160,0.30)';
    ctx.fillRect(0, 0, w, h);
    const id = ctx.getImageData(0, 0, w, h);
    const d = id.data;
    for (let i = 0; i < d.length; i += 4) {
      const avg = d[i] * 0.3 + d[i+1] * 0.59 + d[i+2] * 0.11;
      d[i]   = Math.min(255, d[i]   * 0.55 + avg * 0.45 + 30);
      d[i+1] = Math.min(255, d[i+1] * 0.55 + avg * 0.45 + 20);
      d[i+2] = Math.min(255, d[i+2] * 0.55 + avg * 0.45);
    }
    ctx.putImageData(id, 0, 0);
    const g = ctx.createRadialGradient(cx, cy, h * 0.1, cx, cy, h * 0.72);
    g.addColorStop(0, 'rgba(255,255,255,0)');
    g.addColorStop(1, 'rgba(255,250,200,0.22)');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, w, h);
  }

  if (type === 'glaucoma') {
    const r = Math.min(w, h) * 0.27;
    const g = ctx.createRadialGradient(cx, cy, r, cx, cy, Math.max(w, h) * 0.9);
    g.addColorStop(0, 'rgba(0,0,0,0)');
    g.addColorStop(0.4, 'rgba(0,0,0,0.65)');
    g.addColorStop(1, 'rgba(0,0,0,0.98)');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, w, h);
  }

  if (type === 'amd') {
    const r = Math.min(w, h) * 0.17;
    const g = ctx.createRadialGradient(cx, cy, r * 0.3, cx, cy, r * 1.1);
    g.addColorStop(0, 'rgba(0,0,0,0.96)');
    g.addColorStop(0.65, 'rgba(0,0,0,0.55)');
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, w, h);
  }

  if (type === 'dr') {
    ctx.fillStyle = 'rgba(100,15,15,0.10)';
    ctx.fillRect(0, 0, w, h);
    const spots = [
      [cx*0.65, cy*0.75, 20], [cx*1.35, cy*1.25, 14],
      [cx*0.85, cy*1.45, 24], [cx*1.5,  cy*0.65, 16],
      [cx*0.45, cy*1.05, 11], [cx*1.15, cy*0.5,  18],
      [cx*0.3,  cy*0.6,  9],  [cx*1.6,  cy*1.4,  13]
    ];
    spots.forEach(([x, y, r]) => {
      const dg = ctx.createRadialGradient(x, y, 0, x, y, r);
      dg.addColorStop(0, 'rgba(50,0,0,0.80)');
      dg.addColorStop(1, 'rgba(50,0,0,0)');
      ctx.fillStyle = dg;
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
    });
  }

  if (type === 'lowvision') {
    const id = ctx.getImageData(0, 0, w, h);
    const d = id.data;
    for (let i = 0; i < d.length; i += 4) {
      d[i]   = d[i]   * 0.42;
      d[i+1] = d[i+1] * 0.42;
      d[i+2] = d[i+2] * 0.42;
    }
    ctx.putImageData(id, 0, 0);
    const g = ctx.createRadialGradient(cx, cy, h * 0.08, cx, cy, h * 0.68);
    g.addColorStop(0, 'rgba(0,0,0,0)');
    g.addColorStop(1, 'rgba(0,0,0,0.62)');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, w, h);
  }
}
</script>
</body>
</html>
